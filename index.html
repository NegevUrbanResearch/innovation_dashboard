<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        var v = localStorage.getItem("bsid-theme");
        document.documentElement.setAttribute("data-theme", v === "light" ? "light" : "dark");
      })();
    </script>
    <script>
      (function () {
        var loc = localStorage.getItem("bsid-locale");
        var he = loc === "he";
        document.documentElement.setAttribute("lang", he ? "he" : "en");
        document.documentElement.setAttribute("dir", he ? "rtl" : "ltr");
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Beer Sheva Innovation District — data dashboard template" />
    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Beer Sheva Innovation District</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
