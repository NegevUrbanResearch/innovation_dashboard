name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Require Pages (GitHub Actions as source)
        run: |
          set -euo pipefail
          code=$(curl -sSL -o /tmp/pages.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")
          if [ "$code" = "404" ]; then
            echo "::error::No GitHub Pages site for this repository. One-time setup: Settings → Pages → Build and deployment → Source → GitHub Actions, then save and re-run this workflow."
            echo "https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow"
            exit 1
          fi
          if [ "$code" != "200" ]; then
            echo "GET /repos/${GITHUB_REPOSITORY}/pages failed with HTTP $code"
            cat /tmp/pages.json || true
            exit 1
          fi
          build_type=$(jq -r '.build_type // empty' /tmp/pages.json)
          if [ "$build_type" != "workflow" ]; then
            echo "::error::Pages build_type must be workflow (GitHub Actions). Current: ${build_type:-unknown}. In Settings → Pages set Source to GitHub Actions."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
